        - region "Guia rápido e contexto de uso" [ref=e79]:
          - heading "Guia rápido e contexto de uso" [level=2] [ref=e80]
          - article [ref=e81]:
            - heading "Dois modos para problemas diferentes" [level=3] [ref=e82]
            - paragraph [ref=e83]: Esta ferramenta foi pensada para dois cenarios comuns. O primeiro e copiar conteudo pequeno, como links, chaves Pix, comandos de terminal, tokens temporarios e JSON curto. Nesse caso, o proprio QR Code ja carrega o conteudo ou um fragmento de URL processado no navegador.
            - paragraph [ref=e84]: O segundo cenario e enviar dados maiores, como arquivos, PDFs, imagens, ZIPs leves ou blocos longos de texto. A pagina cria um pareamento manual entre os dois dispositivos usando QR Code e depois envia o conteudo por WebRTC DataChannel.
          - article [ref=e85]:
            - heading "Quando usar o modo QR simples" [level=3] [ref=e86]
            - paragraph [ref=e87]: O modo QR simples e o melhor caminho quando voce quer sair do celular e chegar no PC em poucos segundos sem depender de conta, login ou backend. Ele funciona bem para compartilhar um link aberto no navegador, um payload Pix Copia e Cola, um endereco cripto ou um snippet tecnico curto.
            - paragraph [ref=e88]: Se o texto crescer demais, a ferramenta pode dividir o payload em varias partes. Isso ajuda em alguns fluxos tecnicos, mas para dados mais pesados a melhor escolha continua sendo o modo P2P.
            - list [ref=e89]:
              - listitem [ref=e90]: Links, URLs, rotas internas e deep links.
              - listitem [ref=e91]: Senhas temporarias, tokens de uso curto e codigos de verificacao.
              - listitem [ref=e92]: Chaves Pix, enderecos cripto, JSON pequeno e comandos de terminal.
              - listitem [ref=e93]: Trechos curtos de texto que precisam ser copiados rapido entre dispositivos.
          - article [ref=e94]:
            - heading "Como funciona o envio grande por WebRTC P2P" [level=3] [ref=e95]
            - paragraph [ref=e96]: No modo avancado, um dispositivo gera uma offer WebRTC, o outro responde com uma answer e os dois lados abrem um canal de dados. Esse canal e criptografado pelo proprio stack WebRTC e, quando a conectividade permite, o conteudo segue direto entre os navegadores.
            - paragraph [ref=e97]: A conexao pode usar STUN apenas para descobrir a melhor rota entre os peers. Nao existe relay TURN nesta implementacao. Isso preserva a ideia de conexao direta, mas tambem significa que algumas redes mais restritas podem nao fechar a conexao.
          - article [ref=e98]:
            - heading "Privacidade, limites e o que nao prometer" [level=3] [ref=e99]
            - paragraph [ref=e100]: O texto do modo simples e tratado no navegador. No modo P2P, o payload principal vai pelo DataChannel apos o pareamento manual. Ainda assim, a conectividade real depende da rede, NAT e firewall de cada lado. Sem TURN, alguns cenarios entre redes fechadas podem falhar.
            - paragraph [ref=e101]: Tambem e importante lembrar que QR Code tem limite pratico de tamanho. Se voce estiver tentando empacotar muito conteudo no modo simples, a ferramenta vai dividir em partes ou sugerir migracao para o P2P.
