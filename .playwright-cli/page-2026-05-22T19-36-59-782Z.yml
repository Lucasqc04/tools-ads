        - region "Guia rápido e contexto de uso" [ref=e101]:
          - heading "Guia rápido e contexto de uso" [level=2] [ref=e102]
          - article [ref=e103]:
            - heading "Editor de Markdown completo para escrita e revisao visual" [level=3] [ref=e104]
            - paragraph [ref=e105]: Esta ferramenta foi criada para quem precisa escrever, revisar e publicar Markdown com rapidez, sem depender de software instalado. Voce edita o texto bruto e acompanha ao mesmo tempo o resultado renderizado, com suporte para titulos, listas, links, imagens, tabelas, citacoes e blocos de codigo.
            - paragraph [ref=e106]: O modo de edicao em tela cheia amplia a area de trabalho para aproveitar melhor o monitor no desktop. Assim, fica mais facil trabalhar com documentos longos, documentacao tecnica, README de projeto, notas de reuniao e conteudos para blog sem perder contexto entre o texto e o resultado final.
          - article [ref=e107]:
            - heading "Upload de arquivo .md, atalhos de insercao e exportacao multipla" [level=3] [ref=e108]
            - paragraph [ref=e109]: Se voce ja tem um arquivo Markdown pronto, basta enviar o .md para abrir e continuar editando na hora. A barra de acoes acelera tarefas comuns com insercao de H1, H2, listas ordenadas e nao ordenadas, tabela, bloco de codigo, link e imagem, reduzindo o trabalho manual de sintaxe.
            - paragraph [ref=e110]: "Depois de revisar, voce pode exportar no formato que fizer mais sentido para o seu fluxo: manter em .md para versionamento, gerar .html para publicacao web, baixar em imagem PNG para compartilhamento visual ou converter para PDF para envio e arquivamento."
            - list [ref=e111]:
              - listitem [ref=e112]: Upload local de arquivos .md e .markdown.
              - listitem [ref=e113]: Preview renderizado em tempo real sem sair da pagina.
              - listitem [ref=e114]: Modo foco em tela cheia com editor e preview lado a lado.
              - listitem [ref=e115]: Exportacao em Markdown, HTML, PNG e PDF.
          - article [ref=e116]:
            - heading "Privacidade, limites e boas praticas de uso" [level=3] [ref=e117]
            - paragraph [ref=e118]: Por padrao, o processamento acontece localmente no navegador. Isso aumenta a privacidade para documentos internos e rascunhos de trabalho, porque o conteudo nao precisa ser enviado para backend para renderizar ou exportar.
            - paragraph [ref=e119]: Para documentos muito grandes com muitas imagens externas, a exportacao em PNG ou PDF pode levar mais tempo dependendo da memoria e da CPU do dispositivo. Em fluxos longos, a recomendacao e dividir o conteudo em secoes e exportar por partes quando necessario.
