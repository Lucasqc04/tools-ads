        - region "Guia rápido e contexto de uso" [ref=e80]:
          - heading "Guia rápido e contexto de uso" [level=2] [ref=e81]
          - article [ref=e82]:
            - heading "Dois modos para problemas diferentes" [level=3] [ref=e83]
            - paragraph [ref=e84]: Esta ferramenta foi pensada para dois cenarios comuns. O primeiro e copiar conteudo pequeno, como links, chaves Pix, comandos de terminal, tokens temporarios e JSON curto. Nesse caso, o proprio QR Code ja carrega o conteudo ou um fragmento de URL processado no navegador.
            - paragraph [ref=e85]: O segundo cenario e enviar dados maiores, como arquivos, PDFs, imagens, ZIPs leves ou blocos longos de texto. A pagina cria um pareamento manual entre os dois dispositivos usando QR Code e depois envia o conteudo por WebRTC DataChannel.
          - article [ref=e86]:
            - heading "Quando usar o modo QR simples" [level=3] [ref=e87]
            - paragraph [ref=e88]: O modo QR simples e o melhor caminho quando voce quer sair do celular e chegar no PC em poucos segundos sem depender de conta, login ou backend. Ele funciona bem para compartilhar um link aberto no navegador, um payload Pix Copia e Cola, um endereco cripto ou um snippet tecnico curto.
            - paragraph [ref=e89]: Se o texto crescer demais, a ferramenta pode dividir o payload em varias partes. Isso ajuda em alguns fluxos tecnicos, mas para dados mais pesados a melhor escolha continua sendo o modo P2P.
            - list [ref=e90]:
              - listitem [ref=e91]: Links, URLs, rotas internas e deep links.
              - listitem [ref=e92]: Senhas temporarias, tokens de uso curto e codigos de verificacao.
              - listitem [ref=e93]: Chaves Pix, enderecos cripto, JSON pequeno e comandos de terminal.
              - listitem [ref=e94]: Trechos curtos de texto que precisam ser copiados rapido entre dispositivos.
          - article [ref=e95]:
            - heading "Como funciona o envio grande por WebRTC P2P" [level=3] [ref=e96]
            - paragraph [ref=e97]: No modo avancado, um dispositivo gera uma offer WebRTC, o outro responde com uma answer e os dois lados abrem um canal de dados. Esse canal e criptografado pelo proprio stack WebRTC e, quando a conectividade permite, o conteudo segue direto entre os navegadores.
            - paragraph [ref=e98]: A conexao pode usar STUN apenas para descobrir a melhor rota entre os peers. Nao existe relay TURN nesta implementacao. Isso preserva a ideia de conexao direta, mas tambem significa que algumas redes mais restritas podem nao fechar a conexao.
          - article [ref=e99]:
            - heading "Privacidade, limites e o que nao prometer" [level=3] [ref=e100]
            - paragraph [ref=e101]: O texto do modo simples e tratado no navegador. No modo P2P, o payload principal vai pelo DataChannel apos o pareamento manual. Ainda assim, a conectividade real depende da rede, NAT e firewall de cada lado. Sem TURN, alguns cenarios entre redes fechadas podem falhar.
            - paragraph [ref=e102]: Tambem e importante lembrar que QR Code tem limite pratico de tamanho. Se voce estiver tentando empacotar muito conteudo no modo simples, a ferramenta vai dividir em partes ou sugerir migracao para o P2P.
